name: Daily Health YouTube Upload

on:
  schedule:
    # 05:17 Asia/Seoul is 20:17 UTC on the previous day.
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-longform:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_FALLBACK_VOICE_IDS: airYK6ydeWdrJg6gyZA3
      ELEVENLABS_ALLOW_FALLBACK: "false"
      ELEVENLABS_MODEL: eleven_multilingual_v2
      ELEVENLABS_STABILITY: "0.82"
      ELEVENLABS_SIMILARITY: "0.88"
      ELEVENLABS_STYLE: "0.0"
      ELEVENLABS_SPEAKER_BOOST: "true"
      ELEVENLABS_SPEED: "1.0"
      ELEVENLABS_TEXT_NORMALIZATION: "on"
      ELEVENLABS_SEED: "20260604"
      TTS_PROVIDER: elevenlabs
      TTS_ALLOW_FALLBACK: "false"
      HEYGEN_ENABLED: "false"
      ENABLE_BGM: "false"
      ENABLE_SLIDE_CAPTIONS: "false"
      ENABLE_SLIDE_MOTION: "false"
      BURN_IN_SUBTITLES: "true"
      UPLOAD_YOUTUBE_CAPTIONS: "false"
      IMAGE_PROVIDER: gemini
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_IMAGE_MODEL: gpt-image-1
      OPENAI_IMAGE_SIZE: 1536x1024
      OPENAI_IMAGE_QUALITY: medium
      OPENAI_TEXT_MODEL: gpt-4o-mini
      GEMINI_TEXT_MODEL: gemini-2.5-flash
      GEMINI_IMAGE_MODEL: gemini-2.5-flash-image
      SCENE_IMAGE_MAX_WORKERS: "2"
      YOUTUBE_PRIVACY: public

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r longform_automation/requirements.txt

      - name: Restore YouTube OAuth token
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          Path("token.json").write_text(os.environ["YOUTUBE_TOKEN_JSON"], encoding="utf-8")
          PY
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      - name: Generate and upload one unique health video
        run: python longform_automation/daily_longform_upload_v2.py

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-review-package
          path: |
            output/**/*.mp4
            output/**/*.mp3
            output/**/*.srt
            output/**/frames/*.jpg
          if-no-files-found: warn
          retention-days: 7

      - name: Commit health topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add longform_automation/topic-history.json
          git diff --cached --quiet || git commit -m "Record daily health YouTube topic"
          git push
